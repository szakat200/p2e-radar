<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2E Radar — Solana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Russo+One&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Neon Cyber palette */
  --bg-void: #05030f;
  --bg-deep: #0a0620;
  --glass: rgba(255,255,255,0.035);
  --glass-hi: rgba(255,255,255,0.06);
  --blur: 16px;

  --line: rgba(167,139,250,0.16);
  --line-soft: rgba(255,255,255,0.06);
  --line-strong: rgba(167,139,250,0.35);

  --ink-hi: #f4f2ff;
  --ink: #d6d3ea;
  --ink-mid: #9a94c2;
  --ink-low: #5e5a85;

  --neon-v: #a78bfa;   /* электрический фиолет */
  --neon-c: #22d3ee;   /* киберциан */
  --neon-p: #f472b6;   /* неон-розовый */
  --grad: linear-gradient(135deg, var(--neon-v) 0%, var(--neon-c) 100%);

  --ok: #34d399;
  --ok-soft: rgba(52,211,153,0.12);
  --warn: #fbbf24;
  --warn-soft: rgba(251,191,36,0.12);
  --bad: #fb7185;
  --bad-soft: rgba(251,113,133,0.13);

  --v-soft: rgba(167,139,250,0.12);
  --c-soft: rgba(34,211,238,0.10);
  --p-soft: rgba(244,114,182,0.12);

  --r-sm: 12px;
  --r: 18px;
  --r-lg: 26px;
  --t: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --glow-v: 0 0 24px rgba(167,139,250,0.35);
  --glow-c: 0 0 24px rgba(34,211,238,0.3);
  --display: "Russo One", Inter, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: #2d2755; border-radius: 4px; }
*::-webkit-scrollbar-thumb:hover { background: #3d3575; }

html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-void);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
}

/* ===== Ambient neon background ===== */
.bg-fx {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(1000px 700px at 85% -15%, rgba(167,139,250,0.16), transparent 65%),
    radial-gradient(900px 600px at -15% 40%, rgba(34,211,238,0.10), transparent 65%),
    radial-gradient(700px 500px at 60% 115%, rgba(244,114,182,0.09), transparent 65%),
    linear-gradient(180deg, var(--bg-void) 0%, var(--bg-deep) 55%, var(--bg-void) 100%);
}
.bg-fx::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(167,139,250,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,0.05) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: linear-gradient(180deg, transparent 0%, black 25%, black 60%, transparent 100%);
}
.bg-fx::after {
  content: ""; position: absolute;
  top: -180px; right: -120px; width: 640px; height: 640px;
  background: conic-gradient(from 180deg, transparent, rgba(167,139,250,0.14), transparent 30%);
  border-radius: 50%;
  filter: blur(50px);
}

.app { display: grid; grid-template-columns: 96px 1fr; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  position: sticky; top: 0; height: 100vh;
  background: rgba(10,6,32,0.6);
  backdrop-filter: blur(var(--blur));
  border-right: 1px solid var(--line-soft);
  display: flex; flex-direction: column; align-items: center;
  z-index: 50; padding: 26px 0;
}
.brand {
  font-family: var(--display); font-size: 17px; line-height: 1.1;
  text-align: center;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 14px rgba(167,139,250,0.55));
  margin-bottom: 34px; user-select: none;
}
.nav-btn {
  width: 64px; height: 60px; margin-bottom: 12px;
  border: 1px solid transparent; border-radius: var(--r-sm);
  background: transparent; color: var(--ink-low);
  font-size: 20px; cursor: pointer; transition: all var(--t);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
}
.nav-btn small { font-family: Inter, sans-serif; font-size: 9.5px; letter-spacing: 0.06em; font-weight: 700; text-transform: uppercase; }
.nav-btn:hover { color: var(--ink); background: var(--glass-hi); transform: translateY(-1px); }
.nav-btn.active {
  color: var(--neon-c); background: var(--c-soft);
  border-color: rgba(34,211,238,0.35);
  box-shadow: var(--glow-c), inset 0 0 12px rgba(34,211,238,0.08);
  text-shadow: 0 0 12px rgba(34,211,238,0.8);
}

/* ===== Main ===== */
.main { padding: 44px 52px 90px; max-width: 1340px; }
@keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
.page { animation: rise 0.45s cubic-bezier(0.2, 0.7, 0.3, 1) both; }
.page > * + * { margin-top: 30px; }

.page-title {
  font-family: var(--display); font-size: clamp(26px, 3.6vw, 40px);
  color: var(--ink-hi); line-height: 1.2; letter-spacing: 0.01em;
  text-transform: uppercase;
}
.page-title .accent {
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 16px rgba(34,211,238,0.4));
}
.page-sub { color: var(--ink-mid); font-size: 15px; margin-top: 10px; max-width: 640px; }

/* ===== Hero ===== */
.hero {
  position: relative; overflow: hidden;
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 44px 48px;
}
.hero::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(120deg, rgba(167,139,250,0.10) 0%, transparent 40%, rgba(34,211,238,0.08) 100%);
}
.hero::after {
  content: ""; position: absolute; left: 0; right: 0; top: 0; height: 1px;
  background: var(--grad); opacity: 0.7;
  box-shadow: 0 0 18px rgba(167,139,250,0.8);
}
.hero-label {
  font-family: var(--display); font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--neon-c);
  text-shadow: 0 0 12px rgba(34,211,238,0.6);
  margin-bottom: 14px;
}
.hero-value {
  font-family: var(--mono); font-weight: 700;
  font-size: clamp(44px, 6vw, 72px);
  line-height: 1.05; letter-spacing: -0.02em;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 26px rgba(167,139,250,0.45));
}
.hero-caption { color: var(--ink-mid); font-size: 14.5px; margin-top: 12px; }
.hero-row {
  display: flex; flex-wrap: wrap; gap: 40px;
  margin-top: 34px; padding-top: 26px; border-top: 1px solid var(--line-soft);
  position: relative;
}
.hero-stat .hs-label { font-size: 11px; color: var(--ink-low); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
.hero-stat .hs-value { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--ink-hi); margin-top: 3px; }
.hero-stat .hs-value.red { color: var(--bad); text-shadow: 0 0 14px rgba(251,113,133,0.5); }

/* ===== Panels & cards ===== */
.panel {
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg); padding: 30px;
}
.panel h3 {
  font-family: var(--display); font-size: 15px; color: var(--ink-hi);
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px;
}

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 18px;
}
.tok-card {
  position: relative;
  background: var(--glass);
  border: 1px solid var(--line-soft);
  border-radius: var(--r); padding: 20px;
  cursor: pointer;
  transition: transform var(--t), border-color var(--t), box-shadow var(--t), background var(--t);
}
.tok-card:hover {
  transform: translateY(-4px);
  border-color: var(--line-strong);
  background: var(--glass-hi);
  box-shadow: var(--glow-v), 0 18px 44px rgba(0,0,0,0.5);
}
.tok-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.tok-logo {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg-deep); object-fit: cover; flex-shrink: 0;
  border: 1px solid var(--line);
  box-shadow: 0 0 10px rgba(167,139,250,0.25);
}
.tok-logo-ph {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: var(--bg-deep); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); color: var(--neon-v); font-size: 17px;
}
.tok-sym { font-weight: 800; font-size: 15.5px; color: var(--ink-hi); }
.tok-name { color: var(--ink-mid); font-size: 12.5px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.tok-metrics { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.tok-mcap { font-family: var(--mono); font-size: 19px; font-weight: 700; color: var(--ink-hi); }
.tok-mcap small { display: block; font-size: 10px; color: var(--ink-low); font-family: Inter, sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
.tok-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

/* ===== Tables ===== */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left; padding: 10px 14px; color: var(--ink-low);
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em;
  border-bottom: 1px solid var(--line-strong); white-space: nowrap; font-weight: 700;
}
td { padding: 14px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; white-space: nowrap; }
tr.rowlink { cursor: pointer; transition: background var(--t); }
tr.rowlink:hover { background: var(--v-soft); }
.num { font-family: var(--mono); }
.pos { color: var(--ok); text-shadow: 0 0 10px rgba(52,211,153,0.4); }
.neg { color: var(--bad); text-shadow: 0 0 10px rgba(251,113,133,0.4); }
.cell-tok { display: flex; align-items: center; gap: 11px; }
.cell-tok img, .cell-tok .tok-logo-ph { width: 34px; height: 34px; font-size: 13px; }
.cell-tok img { border-radius: 50%; background: var(--bg-deep); border: 1px solid var(--line); }
.sym { font-weight: 700; color: var(--ink-hi); }
.tname { color: var(--ink-mid); font-size: 12px; }

/* ===== Badges & chips ===== */
.badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 12px; border-radius: 99px;
  font-family: var(--mono); font-size: 12px; font-weight: 700; white-space: nowrap;
  border: 1px solid transparent;
}
.badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
.badge.low    { color: var(--ok); background: var(--ok-soft); border-color: rgba(52,211,153,0.3); }
.badge.medium { color: var(--warn); background: var(--warn-soft); border-color: rgba(251,191,36,0.3); }
.badge.high   { color: var(--bad); background: var(--bad-soft); border-color: rgba(251,113,133,0.35); }
.badge.none   { color: var(--ink-low); background: var(--glass-hi); }

.chip {
  display: inline-block; padding: 2px 10px; margin: 2px 5px 2px 0;
  border-radius: 99px; font-size: 11.5px;
  background: var(--glass-hi); border: 1px solid var(--line-soft); color: var(--ink-mid);
}
.chip.critical { color: var(--bad); border-color: rgba(251,113,133,0.4); background: var(--bad-soft); }
.chip.high     { color: #fb923c; border-color: rgba(251,146,60,0.35); background: rgba(251,146,60,0.1); }
.chip.medium   { color: var(--warn); border-color: rgba(251,191,36,0.3); background: var(--warn-soft); }
.chip.info     { color: var(--neon-c); border-color: rgba(34,211,238,0.3); background: var(--c-soft); }
.chip.good     { color: var(--ok); border-color: rgba(52,211,153,0.3); background: var(--ok-soft); }

/* ===== Search ===== */
.search-row { margin-bottom: 22px; }
.search-row input {
  width: 100%; max-width: 420px; padding: 12px 18px;
  background: var(--glass-hi); border: 1px solid var(--line-soft);
  border-radius: 99px; color: var(--ink); font-size: 14.5px; outline: none;
  transition: border-color var(--t), box-shadow var(--t);
  backdrop-filter: blur(var(--blur));
}
.search-row input:focus { border-color: var(--neon-c); box-shadow: var(--glow-c); }
.search-row input::placeholder { color: var(--ink-low); }

/* ===== Detail ===== */
.detail {
  position: relative;
  background: var(--glass-hi);
  backdrop-filter: blur(var(--blur));
  border: 1px solid var(--line-strong);
  border-radius: var(--r); padding: 26px 28px; margin-top: 20px;
  box-shadow: var(--glow-v);
  animation: rise 0.35s cubic-bezier(0.2, 0.7, 0.3, 1) both;
}
.detail::after {
  content: ""; position: absolute; left: 0; right: 0; top: 0; height: 1px;
  background: var(--grad); opacity: 0.8; border-radius: 99px;
}
.detail h4 { font-family: var(--display); font-size: 18px; color: var(--ink-hi); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.detail .flag-row { padding: 10px 0; border-bottom: 1px solid var(--line-soft); font-size: 14px; }
.detail .flag-row:last-child { border-bottom: none; }
.detail .flag-title { font-weight: 600; color: var(--ink-hi); }
.detail .flag-detail { color: var(--ink-mid); }
.kv { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 18px 0; }
.kv div { font-size: 12.5px; color: var(--ink-mid); }
.kv b { color: var(--ink-hi); font-family: var(--mono); font-weight: 700; display: block; font-size: 15px; margin-top: 2px; }
.game-desc { color: var(--ink-mid); font-size: 13.5px; line-height: 1.6; margin: 14px 0 4px; max-width: 720px; }
.link-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0 4px; }
.link-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 99px; text-decoration: none;
  font-size: 13px; font-weight: 700;
  background: var(--glass-hi); border: 1px solid var(--line-soft); color: var(--ink);
  transition: all var(--t);
}
.link-btn:hover { border-color: var(--neon-c); color: var(--ink-hi); transform: translateY(-1px); box-shadow: var(--glow-c); }
.link-btn.primary {
  background: var(--grad); border: none; color: #0b0620;
  box-shadow: var(--glow-v);
}
.link-btn.primary:hover { filter: brightness(1.12); box-shadow: 0 0 34px rgba(167,139,250,0.55); }

/* ===== Alerts ===== */
.alert-item {
  padding: 16px 18px; border-left: 3px solid var(--bad);
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-bottom: 12px; font-size: 14px;
  transition: transform var(--t), box-shadow var(--t);
}
.alert-item:hover { transform: translateX(3px); box-shadow: -6px 0 18px rgba(251,113,133,0.15); }
.alert-item .atime { color: var(--ink-low); font-size: 11.5px; font-family: var(--mono); margin-bottom: 4px; }
.alert-item.NEW_CATALOG_TOKEN { border-left-color: var(--neon-c); }
.alert-item.NEW_RED_FLAG { border-left-color: var(--warn); }

.empty { color: var(--ink-low); padding: 34px; text-align: center; font-size: 14.5px; }
.loading { color: var(--ink-low); padding: 34px; text-align: center; }
.footnote { color: var(--ink-low); font-size: 12px; margin-top: 14px; }

@media (max-width: 720px) {
  .app { grid-template-columns: 68px 1fr; }
  .main { padding: 22px 16px 60px; }
  .nav-btn { width: 52px; height: 50px; font-size: 17px; }
  .hero { padding: 28px 24px; }
  .hero-row { gap: 22px; }
  .panel { padding: 20px 16px; }
}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="app">
  <aside class="sidebar">
    <div class="brand">P2E<br>RDR</div>
    <button class="nav-btn active" data-page="overview">◈<small>Обзор</small></button>
    <button class="nav-btn" data-page="catalog">🎮<small>Игры</small></button>
    <button class="nav-btn" data-page="watchlist">👁<small>Вотч</small></button>
    <button class="nav-btn" data-page="alerts">⚡<small>Алерты</small></button>
  </aside>
  <main class="main" id="content"><div class="loading">Загрузка…</div></main>
</div>

<script>
const $ = (sel, el = document) => el.querySelector(sel);
const content = $('#content');
let cache = {};

// GitHub Pages / file:// — читаем статические JSON вместо живого API
const IS_STATIC = location.protocol === 'file:' || location.hostname.endsWith('.github.io');

function staticPath(path) {
  const clean = path.split('?')[0];
  if (clean.startsWith('/tokens/')) return 'data/tokens/' + clean.slice('/tokens/'.length) + '.json';
  return 'data' + clean + '.json'; // /stats /catalog /tokens /alerts
}

async function api(path) {
  if (cache[path]) return cache[path];
  const url = IS_STATIC ? staticPath(path) : '/api' + path;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  cache[path] = data;
  return data;
}

function escHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtUsd(v) {
  if (v == null) return '—';
  if (v === 0) return '$0';
  if (v >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v / 1e3).toFixed(1) + 'K';
  if (v >= 1) return '$' + v.toFixed(2);
  if (v < 1e-8) return '<$0.00000001';
  return '$' + v.toFixed(8).replace(/\.?0+$/, '');
}

function fmtPct(v) {
  if (v == null) return '—';
  const cls = v >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(1)}%</span>`;
}

function riskBadge(t) {
  if (t.risk_score == null) return '<span class="badge none">не оценён</span>';
  const label = {low: 'низкий', medium: 'средний', high: 'высокий'}[t.risk_level] || '?';
  return `<span class="badge ${t.risk_level}">${t.risk_score}/100 ${label}</span>`;
}

function logo(t, cls = '') {
  if (t.image_url) {
    return `<img class="tok-logo ${cls}" loading="lazy" src="${escHtml(t.image_url)}" alt=""
      onerror="this.outerHTML='<span class=&quot;tok-logo-ph ${cls}&quot;>${escHtml((t.symbol || '?')[0])}</span>'">`;
  }
  return `<span class="tok-logo-ph ${cls}">${escHtml((t.symbol || '?')[0])}</span>`;
}

function flagChips(flags, max = 4) {
  const reds = (flags || []).filter(f => f.severity !== 'good');
  if (!reds.length) return '<span class="chip good">чисто</span>';
  const shown = reds.slice(0, max)
    .map(f => `<span class="chip ${escHtml(f.severity)}" title="${escHtml(f.detail)}">${escHtml(f.title)}</span>`);
  if (reds.length > max) shown.push(`<span class="chip">+${reds.length - max}</span>`);
  return shown.join('');
}

/* ===== Pages ===== */

async function renderOverview() {
  const [stats, tokens, alerts, catalog] = await Promise.all([
    api('/stats'), api('/tokens'), api('/alerts?limit=5'), api('/catalog?limit=500')]);
  const totalMcap = catalog.reduce((s, t) => s + (t.market_cap || 0), 0);
  const gainers = catalog.filter(t => (t.price_change_h24 || 0) > 0).length;
  const worst = tokens.slice(0, 5);
  content.innerHTML = `<div class="page">
    <div>
      <div class="page-title">Рынок P2E <span class="accent">на Solana</span></div>
      <div class="page-sub">Радар игровых токенов: каталог, ликвидность, on-chain безопасность и красные флаги — обновляется автоматически</div>
    </div>
    <div class="hero">
      <div class="hero-label">Суммарная капитализация каталога</div>
      <div class="hero-value">${fmtUsd(totalMcap)}</div>
      <div class="hero-caption">${stats.catalog_total} игровых токенов · ${gainers} растут за 24ч</div>
      <div class="hero-row">
        <div class="hero-stat"><div class="hs-label">В вотчлисте</div>
          <div class="hs-value">${stats.watched}</div></div>
        <div class="hero-stat"><div class="hs-label">Высокий риск</div>
          <div class="hs-value red">${stats.watched_high_risk}</div></div>
        <div class="hero-stat"><div class="hs-label">Алертов за 24ч</div>
          <div class="hs-value">${stats.alerts_24h}</div></div>
      </div>
    </div>
    <div class="panel">
      <h3>Самые рискованные в вотчлисте</h3>
      ${worst.length ? tokenTable(worst) : '<div class="empty">Вотчлист пуст — добавь токены через бота: /watch &lt;mint&gt;</div>'}
      <div id="detail"></div>
    </div>
    <div class="panel">
      <h3>Последние алерты</h3>
      ${alerts.length ? alerts.map(alertItem).join('') : '<div class="empty">Алертов пока не было</div>'}
    </div>
  </div>`;
  bindRows();
}

function tokenTable(tokens) {
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>Токен</th><th>Цена</th><th>24ч</th><th>Ликвидность</th>
      <th>Объём 24ч</th><th>MCap</th><th>Риск</th><th>Флаги</th></tr></thead>
    <tbody>${tokens.map(t => `
      <tr class="rowlink" data-mint="${escHtml(t.mint)}">
        <td><div class="cell-tok">${logo(t)}<div>
          <div class="sym">${escHtml(t.symbol || '?')}</div>
          <div class="tname">${escHtml(t.name || '')}</div></div></div></td>
        <td class="num">${fmtUsd(t.price_usd)}</td>
        <td class="num">${fmtPct(t.price_change_h24)}</td>
        <td class="num">${fmtUsd(t.liquidity_usd)}</td>
        <td class="num">${fmtUsd(t.volume_h24)}</td>
        <td class="num">${fmtUsd(t.market_cap)}</td>
        <td>${riskBadge(t)}</td>
        <td>${flagChips(t.risk_flags)}</td>
      </tr>`).join('')}</tbody></table></div>`;
}

function tokenCard(t) {
  return `<div class="tok-card rowlink" data-mint="${escHtml(t.mint)}">
    <div class="tok-head">${logo(t)}<div>
      <div class="tok-sym">${escHtml(t.name || t.symbol || '?')}</div>
      <div class="tok-name">$${escHtml(t.symbol || '?')} · ${escHtml((t.categories || [])[0] || 'p2e')}</div></div></div>
    <div class="tok-metrics">
      <div class="tok-mcap"><small>Market cap</small>${fmtUsd(t.market_cap)}</div>
      <div class="num" style="font-size:15px">${fmtPct(t.price_change_h24)}</div>
    </div>
    <div class="tok-foot">
      ${riskBadge(t)}
      <span class="chip" title="Ликвидность на Solana DEX">liq ${fmtUsd(t.liquidity_usd)}</span>
    </div>
  </div>`;
}

async function renderCatalog() {
  const [rows, watched] = await Promise.all([
    api('/catalog?limit=500'), api('/tokens')]);
  // Вотчлист участвует в поиске (напр. RELIC — ручной токен, не из каталога)
  const catalogMints = new Set(rows.map(t => t.mint));
  const extra = watched.filter(t => !catalogMints.has(t.mint));
  content.innerHTML = `<div class="page">
    <div>
      <div class="page-title">Игры <span class="accent">каталог</span></div>
      <div class="page-sub">${rows.length} P2E/gaming токенов на Solana из CoinGecko. Клик по карточке — детальный разбор рисков (топ-20 и вотчлист проверяются полностью).</div>
    </div>
    <div class="panel">
      <div class="search-row"><input id="catSearch" placeholder="Поиск по названию, тикеру или mint…"></div>
      <div id="catGrid"></div>
      <div id="detail"></div>
    </div>
  </div>`;
  const draw = (list) => {
    $('#catGrid').innerHTML = list.length
      ? `<div class="card-grid">${list.map(tokenCard).join('')}</div>`
      : `<div class="empty">Ничего не найдено ни в каталоге, ни в вотчлисте.<br>
         Любой токен можно проверить по mint-адресу через бота: /check &lt;mint&gt;</div>`;
    bindRows();
  };
  draw(rows);
  $('#catSearch').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    draw(!q ? rows : [...rows, ...extra].filter(t =>
      (t.name || '').toLowerCase().includes(q) ||
      (t.symbol || '').toLowerCase().includes(q) ||
      (t.mint || '').toLowerCase() === q));
  });
}

async function renderWatchlist() {
  const tokens = await api('/tokens');
  content.innerHTML = `<div class="page">
    <div>
      <div class="page-title">Вотчлист <span class="accent">радар</span></div>
      <div class="page-sub">Токены под мониторингом. Управление — через бота: /watch и /unwatch.</div>
    </div>
    <div class="panel">
      ${tokens.length ? tokenTable(tokens) : '<div class="empty">Пусто. Добавь токен в боте: /watch &lt;mint&gt;</div>'}
      <div id="detail"></div>
    </div>
  </div>`;
  bindRows();
}

async function showDetail(mint) {
  const host = $('#detail') || content.appendChild(Object.assign(
    document.createElement('div'), {id: 'detail'}));
  host.innerHTML = '<div class="loading">Загрузка деталей…</div>';
  try {
    const d = await api('/tokens/' + mint);
    const s = d.security;
    const yn = (v, yes, no) => v == null ? '—' : (v ? yes : no);
    // Название игры без дубля тикера ("GALA GALA" -> "GALA")
    const title = (d.name && d.name.toLowerCase() !== (d.symbol || '').toLowerCase())
      ? `${escHtml(d.name)} <span style="color:var(--ink-low);font-size:14px">$${escHtml(d.symbol || '?')}</span>`
      : escHtml(d.name || d.symbol || '?');
    const L = d.links || {};
    const linkBtns = [
      L.homepage && `<a class="link-btn primary" href="${escHtml(L.homepage)}" target="_blank" rel="noopener">🎮 Сайт игры</a>`,
      L.twitter && `<a class="link-btn" href="${escHtml(L.twitter)}" target="_blank" rel="noopener">𝕏 Twitter</a>`,
      L.telegram && `<a class="link-btn" href="${escHtml(L.telegram)}" target="_blank" rel="noopener">✈️ Telegram</a>`,
      L.discord && `<a class="link-btn" href="${escHtml(L.discord)}" target="_blank" rel="noopener">💬 Discord</a>`,
      `<a class="link-btn" href="https://solscan.io/token/${escHtml(d.mint)}" target="_blank" rel="noopener">⛓ Solscan</a>`,
    ].filter(Boolean).join('');
    const flagRow = f => `
        <div class="flag-row"><span class="chip ${escHtml(f.severity)}">${f.severity === 'good' ? '✅' : escHtml(f.severity)}</span>
          <span class="flag-title">${escHtml(f.title)}</span> —
          <span class="flag-detail">${escHtml(f.detail)}</span></div>`;
    const reds = (d.risk_flags || []).filter(f => f.severity !== 'good');
    const greens = (d.risk_flags || []).filter(f => f.severity === 'good');
    const flagsBlock = d.risk_score == null
      ? '<div class="flag-row" style="color:var(--ink-low)">Токен ещё не проходил полную проверку рисков (она есть у вотчлиста и топ-20 каталога). Быстрая проверка: /check в боте.</div>'
      : (reds.length ? reds.map(flagRow).join('') : '<div class="flag-row">✅ Красных флагов нет</div>')
        + greens.map(flagRow).join('');
    host.innerHTML = `<div class="detail">
      <h4>${logo(d)} ${title} ${riskBadge(d)}</h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--ink-low)">${escHtml(d.mint)}</div>
      ${d.description ? `<div class="game-desc">${escHtml(d.description)}</div>` : ''}
      <div class="link-row">${linkBtns}</div>
      <div class="kv">
        <div>Цена<b>${fmtUsd(d.price_usd)}</b></div>
        <div>Ликвидность на Solana<b>${fmtUsd(d.liquidity_usd)}</b></div>
        <div>Объём 24ч<b>${fmtUsd(d.volume_h24)}</b></div>
        <div>Market cap<b>${fmtUsd(d.market_cap)}</b></div>
        <div>DEX<b>${escHtml(d.dex_id || '—')}</b></div>
        ${s ? `
        <div>Mint authority<b>${yn(s.mint_authority_active, '🔴 активен', '🟢 отозван')}</b></div>
        <div>Freeze authority<b>${yn(s.freeze_authority_active, '🔴 активен', '🟢 отозван')}</b></div>
        <div>Топ-10 холдеров<b>${s.top10_holder_pct != null ? s.top10_holder_pct.toFixed(0) + '%' : '—'}</b></div>
        <div>LP locked<b>${s.lp_locked_pct != null ? s.lp_locked_pct.toFixed(0) + '%' : '—'}</b></div>
        <div>Холдеров<b>${s.holders_count ?? '—'}</b></div>` : ''}
      </div>
      ${flagsBlock}
    </div>`;
    host.scrollIntoView({behavior: 'smooth', block: 'nearest'});
  } catch (e) {
    host.innerHTML = `<div class="detail"><div class="empty">${IS_STATIC
      ? 'Полная проверка есть только у вотчлиста и топ-20 каталога. Проверь локально: /check в боте.'
      : 'Не удалось загрузить: ' + escHtml(e.message)}</div></div>`;
  }
}

function bindRows() {
  content.querySelectorAll('.rowlink').forEach(el =>
    el.addEventListener('click', () => showDetail(el.dataset.mint)));
}

function alertItem(a) {
  const dt = a.sent_at ? new Date(a.sent_at).toLocaleString('ru-RU') : '';
  const text = (a.message || '').replace(/<[^>]+>/g, '');
  return `<div class="alert-item ${escHtml(a.alert_type)}">
    <div class="atime">${escHtml(dt)} · ${escHtml(a.alert_type)}</div>
    <div>${escHtml(text)}</div></div>`;
}

async function renderAlerts() {
  const alerts = await api('/alerts?limit=100');
  content.innerHTML = `<div class="page">
    <div>
      <div class="page-title">Алерты <span class="accent">сигналы</span></div>
      <div class="page-sub">История уведомлений: падения ликвидности и цены, новые красные флаги, новые игры в каталоге.</div>
    </div>
    <div class="panel">
      ${alerts.length ? alerts.map(alertItem).join('') : '<div class="empty">Алертов пока не было</div>'}
      ${IS_STATIC ? '<div class="footnote">Алерты приходят в Telegram через локального бота — на статическом сайте история недоступна.</div>' : ''}
    </div>
  </div>`;
}

const pages = {
  overview: renderOverview,
  catalog: renderCatalog,
  watchlist: renderWatchlist,
  alerts: renderAlerts,
};

async function navigate(page) {
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.page === page));
  cache = {};
  content.innerHTML = '<div class="loading">Загрузка…</div>';
  try {
    await pages[page]();
  } catch (e) {
    content.innerHTML = `<div class="empty">Ошибка загрузки: ${escHtml(e.message)}.<br>
      Проверь, что API запущен (uvicorn web_app:app).</div>`;
  }
}

document.querySelectorAll('.nav-btn').forEach(b =>
  b.addEventListener('click', () => navigate(b.dataset.page)));
navigate('overview');
</script>
</body>
</html>
