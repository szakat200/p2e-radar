name: Build & deploy dashboard to Pages

on:
  schedule:
    - cron: "17 * * * *"   # раз в час
  workflow_dispatch:        # ручной запуск из вкладки Actions
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Export static site
        env:
          PREV_CATALOG_URL: https://szakat200.github.io/p2e-radar/data/catalog.json
        run: python scripts/export_static.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
